<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Todos (Spring)</title>
</head>
<body>
    <h1>Todos-App (Spring)</h1>
    <p><a href="todos">Alle Todos anzeigen</a></p>

    <h2>Suchen</h2>
    <form action="todos" method="get">
        <input type="text" name="search" placeholder="Titel durchsuchen…">
        <button type="submit">Suchen</button>
    </form>

    <h2>Neues Todo</h2>
    <form action="add-todo" method="post">
        <p>
            <label>Titel:<br>
                <input type="text" name="title" minlength="3" maxlength="100" required>
            </label>
        </p>
        <p>
            <label>Beschreibung:<br>
                <textarea name="description" rows="3" cols="40"></textarea>
            </label>
        </p>
        <p>
            <label>Frist:<br>
                <input type="date" name="dueDate" id="dueDate">
            </label>
        </p>
        <button type="submit">Anlegen</button>
    </form>

    <script>
        // Frist beim Laden auf heute + 2 Wochen vorbelegen (lokale Datumsbestandteile).
        (function () {
            var d = new Date();
            d.setDate(d.getDate() + 14);
            var iso = d.getFullYear() + '-'
                + String(d.getMonth() + 1).padStart(2, '0') + '-'
                + String(d.getDate()).padStart(2, '0');
            document.getElementById('dueDate').value = iso;
        })();
    </script>

    <h2>REST API</h2>
    <p>
        Die REST-API liegt unter <a href="api/todos"><code>api/todos</code></a>.
        Anders als die Jakarta-EE-Variante bringt diese Spring-App keine Swagger UI
        mit (kein MicroProfile OpenAPI).
    </p>
</body>
</html>
