# Anwendungs-Konfiguration (Spring). Gegenstueck zu server.xml-Variablen und
# microprofile-config.properties der Jakarta-EE-App.

# H2-Datenbank (dateibasiert). ${todos.db.dir} kommt als System-Property aus den
# bootstrapProperties des liberty-maven-plugin; Fallback ist ./.localdb.
todos.db.url=jdbc:h2:file:${todos.db.dir:./.localdb}/todos-spring;AUTO_SERVER=TRUE

# Beispieldaten beim Start anlegen? Konvention: deaktiviert (siehe SampleDataInitializer).
todos.sampledata.enabled=false
