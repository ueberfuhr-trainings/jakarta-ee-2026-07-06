# Anwendungs-Konfiguration (Spring). Gegenstueck zur
# microprofile-config.properties der Jakarta-EE-App.
#
# Die Datenbank/DataSource wird NICHT hier konfiguriert, sondern vom Liberty
# bereitgestellt (server.xml -> dataSource jdbc/todos, persistence.xml). Spring
# holt die EntityManagerFactory per JNDI (LibertyPersistenceConfig).

# Beispieldaten beim Start anlegen? Konvention: deaktiviert (siehe SampleDataInitializer).
todos.sampledata.enabled=false
