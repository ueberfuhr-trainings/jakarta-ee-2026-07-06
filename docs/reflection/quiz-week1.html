<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jakarta EE Quiz - ATVANTAGE Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #111111;
      color: #eeeeee;
    }

    .academy-header {
      background-color: #1e1e1e;
      border-bottom: 3px solid #ff5401;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .quiz-card {
      background-color: #1e1e1e;
      border: 1px solid #333333;
      transition: all 0.3s ease;
    }

    .option-btn {
      background-color: #2a2a2a;
      border: 2px solid #333333;
      transition: all 0.2s ease;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) {
      background-color: #333333;
      border-color: #444444;
    }

    .option-btn.correct {
      background-color: #14532d;
      border-color: #22c55e;
    }

    .option-btn.wrong {
      background-color: #431407;
      border-color: #ff5401;
    }

    .code-block {
      background-color: #000000;
      font-family: 'Courier New', Courier, monospace;
      border: 1px solid #333333;
    }

    .email-hover-bridge::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 0;
      right: 0;
      height: 20px;
      background: transparent;
    }
  </style>
</head>
<body>

<!-- Academy Top Bar -->
<nav class="academy-header sticky top-0 z-40 w-full px-6 h-16 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <span class="text-xl font-black tracking-tighter text-[#ff5401]">ATVANTAGE</span>
    <span class="text-xl font-light text-neutral-500">Academy</span>
  </div>
  <div class="flex items-center gap-4">
    <div class="relative group">
      <button id="email-btn" class="p-2 text-neutral-400 hover:text-[#ff5401] transition-colors"
              title="E-Mail Kontakt">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </button>
      <div class="absolute right-0 top-10 hidden group-hover:flex items-center gap-3 bg-[#2a2a2a] border border-[#333333] p-2 px-3 rounded-lg shadow-2xl z-50 email-hover-bridge">
        <a id="email-link-display" href="#"
           class="text-sm font-medium text-slate-300 hover:text-[#ff5401] transition-colors underline decoration-dotted underline-offset-4 decoration-slate-600">academy@atvantage.com</a>
        <button id="copy-email-sub-btn"
                class="bg-[#ff5401] hover:bg-[#e64a00] p-1.5 rounded transition-colors text-[#111111]"
                title="Kopieren">
          <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
          </svg>
          <svg id="check-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none"
               viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="w-full min-h-screen flex items-center justify-center p-4 md:p-8">

<div id="quiz-container" class="w-full max-w-2xl">
  <!-- Header -->
  <div class="mb-8 text-center">
    <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Jakarta EE <span class="text-[#ff5401]">Wissens-Check</span></h1>
    <p class="text-neutral-500">Servlets, JSP, CDI &amp; Bean Validation – Woche 1</p>
    <div class="mt-4 flex justify-between items-center text-xs text-neutral-500 mb-1">
      <span id="question-counter">Frage 1 von 25</span>
      <span id="score-counter">Punkte: 0</span>
    </div>
    <div class="h-2 w-full bg-[#1e1e1e] rounded-full overflow-hidden border border-[#333333]">
      <div id="progress-bar" class="h-full bg-[#ff5401] transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <!-- Question Card -->
  <div id="question-card" class="quiz-card p-6 rounded-2xl shadow-2xl">
    <div id="question-content">
    </div>

    <div id="options-container" class="space-y-3 mt-6">
    </div>

    <div id="feedback" class="mt-6 p-4 rounded-lg hidden border-l-4">
    </div>

    <button id="next-btn"
            class="mt-6 w-full py-3 bg-[#ff5401] hover:bg-[#e64a00] font-semibold rounded-xl transition-colors hidden text-white">
      Nächste Frage
    </button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="quiz-card p-8 rounded-2xl shadow-2xl text-center hidden">
    <h2 class="text-4xl font-extrabold text-white mb-4">Training <span class="text-[#ff5401]">beendet!</span></h2>
    <p id="final-score" class="text-xl mb-6"></p>
    <div id="score-interpretation" class="mb-8 text-neutral-400"></div>
    <button onclick="location.reload()" class="px-8 py-3 bg-[#ff5401] hover:bg-[#e64a00] font-semibold rounded-xl text-white transition-colors">
      Quiz neu starten
    </button>
  </div>
</div>

</div>

<script>
  function getAcademyEmail() {
    const part1 = 'academy';
    const part2 = 'atvantage.com';
    return part1 + '@' + part2;
  }

  // E-Mail Anzeige initialisieren
  const emailLink = document.getElementById('email-link-display');
  emailLink.innerText = getAcademyEmail();

  // E-Mail Logik (Header Button)
  document.getElementById('email-btn').onclick = function () {
    window.location.href = 'mailto:' + getAcademyEmail();
  };

  // E-Mail Logik (Popup Link)
  emailLink.onclick = function (e) {
    e.preventDefault();
    window.location.href = 'mailto:' + getAcademyEmail();
  };
  emailLink.onmouseenter = function () {
    this.href = 'mailto:' + getAcademyEmail();
  };

  // E-Mail Kopieren
  document.getElementById('copy-email-sub-btn').onclick = function () {
    const email = getAcademyEmail();
    const temp = document.createElement('textarea');
    temp.value = email;
    document.body.appendChild(temp);
    temp.select();
    try {
      document.execCommand('copy');
      const copyIcon = document.getElementById('copy-icon');
      const checkIcon = document.getElementById('check-icon');
      copyIcon.classList.add('hidden');
      checkIcon.classList.remove('hidden');
      setTimeout(() => {
        copyIcon.classList.remove('hidden');
        checkIcon.classList.add('hidden');
      }, 2000);
    } catch (err) {
      console.error('Kopieren fehlgeschlagen');
    }
    document.body.removeChild(temp);
  };

  const questions = [
    {
      description: "HTTP ist die Grundlage der Kommunikation zwischen Browser und Server.",
      question: "Welche HTTP-Methode wird üblicherweise verwendet, um eine Ressource nur abzurufen, ohne den Serverzustand zu verändern?",
      options: [
        {text: "GET", correct: true, feedback: "Richtig! GET gilt als 'sicher' und dient dem reinen Lesen."},
        {text: "POST", correct: false, feedback: "POST wird zum Senden/Anlegen von Daten verwendet."},
        {text: "PUT", correct: false, feedback: "PUT ersetzt/aktualisiert eine Ressource – es verändert also Zustand."},
        {text: "DELETE", correct: false, feedback: "DELETE löscht eine Ressource – es verändert Zustand."}
      ]
    },
    {
      description: "Ein Benutzer sendet ein Formular mit ungültigen Daten ab, und der Server lehnt es ab.",
      question: "Welcher Status-Code-Bereich signalisiert, dass der CLIENT einen Fehler gemacht hat?",
      options: [
        {text: "4xx", correct: true, feedback: "Richtig! 4xx steht für Client-Fehler, z.B. 400 Bad Request oder 404 Not Found."},
        {text: "2xx", correct: false, feedback: "2xx bedeutet Erfolg."},
        {text: "3xx", correct: false, feedback: "3xx steht für Weiterleitungen (Redirects)."},
        {text: "5xx", correct: false, feedback: "5xx steht für Fehler auf der Serverseite."}
      ]
    },
    {
      description: "In der ersten Servlet-Übung hat das Servlet reinen Text bzw. HTML ausgegeben.",
      question: "Mit welchem Response-Header teilst Du dem Browser mit, wie er den Body interpretieren soll (z.B. text/plain oder text/html)?",
      options: [
        {text: "Content-Type", correct: true, feedback: "Richtig! Z.B. resp.setContentType(\"text/html;charset=UTF-8\")."},
        {text: "Content-Length", correct: false, feedback: "Der gibt nur die Größe des Bodys in Bytes an."},
        {text: "Accept", correct: false, feedback: "Accept ist ein REQUEST-Header, mit dem der Client sagt, was er entgegennimmt."},
        {text: "Location", correct: false, feedback: "Location wird für Weiterleitungen (Redirects) verwendet."}
      ]
    },
    {
      description: "Ein Servlet ist mit @WebServlet(\"/todos\") annotiert. Die Anwendung läuft unter dem Context-Root /todos-app.",
      question: "Unter welchem Pfad ist das Servlet erreichbar?",
      options: [
        {text: "/todos-app/todos", correct: true, feedback: "Richtig! Context-Root plus Servlet-Mapping."},
        {text: "/todos", correct: false, feedback: "Der Context-Root fehlt."},
        {text: "/todos-app", correct: false, feedback: "Das ist nur der Context-Root ohne Servlet-Mapping."},
        {text: "/todos/todos-app", correct: false, feedback: "Reihenfolge vertauscht – erst Context-Root, dann Mapping."}
      ]
    },
    {
      description: "Ein HttpServlet soll auf GET-Requests reagieren.",
      question: "Welche Methode überschreibst Du dafür?",
      options: [
        {text: "doGet(...)", correct: true, feedback: "Richtig! Analog behandelt doPost(...) POST-Requests."},
        {text: "service(...) muss man immer selbst schreiben", correct: false, feedback: "service(...) verteilt intern an doGet/doPost – man überschreibt normalerweise doGet/doPost."},
        {text: "onGet(...)", correct: false, feedback: "Diese Methode gibt es in der Servlet-API nicht."},
        {text: "handleRequest(...)", correct: false, feedback: "Diese Methode gibt es in der Servlet-API nicht."}
      ]
    },
    {
      description: "Ein Formular sendet ein Feld mit dem Namen \"title\" an ein Servlet.",
      question: "Wie liest Du diesen Wert im Servlet aus?",
      options: [
        {text: "req.getParameter(\"title\")", correct: true, feedback: "Richtig! getParameter liefert Formular- bzw. Query-Werte als String."},
        {text: "req.getAttribute(\"title\")", correct: false, feedback: "Attribute sind serverinterne Objekte (z.B. für den Forward an eine JSP), keine Request-Parameter."},
        {text: "req.getHeader(\"title\") aus dem HTTP-Header", correct: false, feedback: "getHeader liest HTTP-Header, nicht Formularfelder."},
        {text: "req.readField(\"title\")", correct: false, feedback: "Diese Methode existiert nicht."}
      ]
    },
    {
      description: "Zum Anlegen eines neuen Todos gibt es ein Formular.",
      question: "Warum wählt man dafür sinnvollerweise POST statt GET?",
      options: [
        {text: "POST ist für zustandsändernde Aktionen gedacht, GET nur zum Lesen.", correct: true, feedback: "Genau. GET ist 'sicher' und idempotent; das Anlegen verändert Serverzustand."},
        {text: "Weil GET grundsätzlich keine Formulardaten über das Netzwerk an den Server übertragen kann.", correct: false, feedback: "Falsch – GET überträgt Parameter über den Query-String."},
        {text: "Weil POST die Daten verschlüsselt.", correct: false, feedback: "POST verschlüsselt nicht; das macht erst HTTPS."},
        {text: "Weil GET auf dem Server nicht ankommt.", correct: false, feedback: "Doch, GET erreicht den Server ganz normal."}
      ]
    },
    {
      description: "Nach dem Absenden eines POST-Formulars drückt der Benutzer F5. Der Browser warnt: 'Formular erneut senden?'.",
      question: "Wie verhindert man sauber, dass dabei versehentlich ein zweites Todo angelegt wird?",
      options: [
        {text: "Nach dem POST per Redirect auf eine GET-Seite umleiten (Post-Redirect-Get, kurz PRG).", correct: true, feedback: "Richtig! Nach dem Redirect lädt F5 nur noch die harmlose GET-Seite neu."},
        {text: "Den Browser-Cache deaktivieren, damit die Seite beim Neuladen nicht erneut gesendet wird.", correct: false, feedback: "Das ändert nichts am erneuten Absenden des POST."},
        {text: "Das Formular per GET statt POST senden.", correct: false, feedback: "Dann landen zustandsändernde Aktionen in der URL – keine gute Lösung."},
        {text: "F5 per JavaScript abfangen.", correct: false, feedback: "Unzuverlässig und umgeht das Problem nur scheinbar."}
      ]
    },
    {
      description: "Das Formular wird abgeschickt, aber es wird nie ein Todo angelegt – der Server antwortet mit einem Fehler (HTTP 405).",
      code: "&lt;!-- neu.html --&gt;\n&lt;form action=\"add\" method=\"post\"&gt;\n  &lt;input name=\"title\"&gt;\n  &lt;button&gt;Anlegen&lt;/button&gt;\n&lt;/form&gt;\n\n// AddTodoServlet.java\n@WebServlet(\"/add\")\npublic class AddTodoServlet extends HttpServlet {\n  protected void doGet(HttpServletRequest req,\n                       HttpServletResponse resp) {\n    // ... Todo anlegen ...\n  }\n}",
      question: "Warum funktioniert das nicht?",
      options: [
        {text: "Das Formular sendet per POST, das Servlet hat nur doGet(...). Für POST greift die Default-Methode mit HTTP 405.", correct: true, feedback: "Genau! POST landet in doPost(...) – das ist hier nicht überschrieben. Lösung: doPost(...) implementieren (oder das Formular auf method=\"get\" umstellen)."},
        {text: "Ein Servlet kann HTML-Formulardaten grundsätzlich nicht verarbeiten; dafür ist zwingend eine JSP mit einem eigenen Formular-Tag und einem passenden Bean nötig.", correct: false, feedback: "Falsch – Servlets verarbeiten Formulardaten problemlos über getParameter(...)."},
        {text: "Die action \"add\" ist ungültig, weil sie nicht mit / beginnt.", correct: false, feedback: "Ein relativer Pfad ist erlaubt und trifft hier das Mapping /add korrekt."},
        {text: "Das &lt;input&gt; braucht ein type-Attribut, sonst wird nichts gesendet.", correct: false, feedback: "Ohne type gilt der Default text – das Feld wird trotzdem gesendet."}
      ]
    },
    {
      description: "In der JSP-Übung hast Du gelernt, dass eine JSP keine Sonderform von HTML ist.",
      question: "Was passiert technisch mit einer JSP, bevor sie ausgeführt wird?",
      options: [
        {text: "Sie wird in ein Servlet übersetzt und kompiliert.", correct: true, feedback: "Richtig! Eine JSP ist letztlich ein Servlet in Template-Form."},
        {text: "Sie wird unverändert als statische Datei ausgeliefert.", correct: false, feedback: "Nein, dynamische Anteile (${...}, Tags) müssen ausgewertet werden."},
        {text: "Sie wird direkt vom Browser interpretiert.", correct: false, feedback: "Der Browser sieht nur das fertige HTML, nie die JSP selbst."},
        {text: "Sie wird zur Laufzeit Zeile für Zeile vom Webserver vorgelesen.", correct: false, feedback: "Nein, sie wird einmalig in Java-Code übersetzt und kompiliert."}
      ]
    },
    {
      description: "Das Servlet beschafft die Todo-Liste, die JSP stellt sie dar (Trennung der Verantwortlichkeiten).",
      question: "Wie übergibt das Servlet die Liste an die JSP und ruft sie auf?",
      options: [
        {text: "Als Request-Attribut ablegen und per Forward weiterleiten.", correct: true, feedback: "Richtig! setAttribute(...) + RequestDispatcher.forward(...) ist das klassische Vorgehen."},
        {text: "Als Query-Parameter an die JSP-URL anhängen.", correct: false, feedback: "Eine Collection lässt sich so nicht sinnvoll übergeben."},
        {text: "Über eine globale static-Variable.", correct: false, feedback: "Das ist fehleranfällig und nicht requestbezogen."},
        {text: "Per sendRedirect(...) auf die JSP, sodass der Browser sie mit den Daten neu anfordert.", correct: false, feedback: "Ein Redirect startet einen neuen Request – die Attribute wären weg."}
      ]
    },
    {
      description: "Die JSP soll nur über das Servlet erreichbar sein, nicht direkt per URL.",
      question: "Warum legt man sie dafür unter WEB-INF ab?",
      options: [
        {text: "Ressourcen unter WEB-INF sind nicht direkt per URL aufrufbar.", correct: true, feedback: "Richtig! Ein direkter Aufruf liefert 404; nur der serverseitige Forward funktioniert."},
        {text: "Weil JSPs technisch ausschließlich innerhalb des WEB-INF-Verzeichnisses kompiliert werden können.", correct: false, feedback: "Falsch, JSPs können auch außerhalb von WEB-INF liegen."},
        {text: "Weil der Server WEB-INF schneller ausliefert.", correct: false, feedback: "Performance ist nicht der Grund."},
        {text: "Weil die JSTL das vorschreibt.", correct: false, feedback: "Die JSTL hat damit nichts zu tun."}
      ]
    },
    {
      description: "Du willst in einer JSP mit der JSTL über die Todo-Collection iterieren.",
      question: "Welches Tag verwendest Du?",
      options: [
        {text: "&lt;c:forEach&gt;", correct: true, feedback: "Richtig! items=\"${todos}\" var=\"todo\"."},
        {text: "&lt;c:loop&gt;", correct: false, feedback: "Gibt es nicht."},
        {text: "&lt;c:iterate&gt;", correct: false, feedback: "Gibt es nicht."},
        {text: "&lt;jsp:forEach&gt;", correct: false, feedback: "Falscher Namensraum – forEach kommt aus der JSTL-Core-Taglib (c)."}
      ]
    },
    {
      description: "Dependency Injection ist ein zentrales Konzept von CDI.",
      question: "Was beschreibt Dependency Injection am besten?",
      options: [
        {text: "Ein Objekt bekommt seine Abhängigkeiten von außen gereicht, statt sie selbst zu erzeugen.", correct: true, feedback: "Genau das ist der Kern von DI."},
        {text: "Ein Objekt erzeugt alle seine Abhängigkeiten selbst mit new und verwaltet deren Lebenszyklus vollständig eigenständig.", correct: false, feedback: "Das ist gerade das Gegenteil von DI."},
        {text: "Abhängigkeiten werden aus einer Datenbank nachgeladen.", correct: false, feedback: "Nein, es geht um das Bereitstellen von Objekten durch den Container."},
        {text: "Ein Verfahren, um Objekte zu serialisieren.", correct: false, feedback: "Das hat mit DI nichts zu tun."}
      ]
    },
    {
      description: "DI wird oft im selben Atemzug mit 'Inversion of Control' genannt.",
      question: "Was bedeutet Inversion of Control hier?",
      options: [
        {text: "Der Container kontrolliert das Erzeugen und Verdrahten der Objekte.", correct: true, feedback: "Richtig! Die Kontrolle wird 'umgedreht' und an den Container abgegeben, nicht das Objekt selbst."},
        {text: "Der Kontrollfluss des Programms läuft rückwärts, sodass Methoden von unten nach oben aufgerufen werden.", correct: false, feedback: "Nein, damit ist nicht die Ausführungsreihenfolge gemeint."},
        {text: "Der Benutzer steuert den Server fern.", correct: false, feedback: "Damit hat IoC nichts zu tun."},
        {text: "Schleifen werden vom Compiler invertiert.", correct: false, feedback: "Das ist frei erfunden."}
      ]
    },
    {
      description: "Du möchtest in einem @WebServlet einen CDI-Service über den Konstruktor injizieren – es klappt nicht.",
      question: "Warum funktioniert Constructor Injection in einem Servlet nicht?",
      options: [
        {text: "Das Servlet wird vom Web-Container erzeugt (parameterloser Konstruktor), nicht vom CDI-Container.", correct: true, feedback: "Genau! Der Web-Container gibt vor, dass ein Servlet über einen parameterlosen Standardkonstruktor erzeugt wird – für Constructor Injection bleibt daher kein Platz. Field-Injection funktioniert aber."},
        {text: "Weil Servlets grundsätzlich keine Konstruktoren haben dürfen.", correct: false, feedback: "Doch, sie haben (mindestens) den Standardkonstruktor."},
        {text: "Weil @Inject an Konstruktoren technisch nicht existiert.", correct: false, feedback: "@Inject an Konstruktoren gibt es sehr wohl – nur greift es hier nicht."},
        {text: "Weil der Konstruktor eines Servlets laut Spezifikation privat sein muss und daher nicht für eine Injection genutzt werden kann.", correct: false, feedback: "Falsch, der Konstruktor muss nicht privat sein."}
      ]
    },
    {
      description: "Constructor Injection scheidet im Servlet also aus.",
      question: "Wie injizierst Du einen CDI-Bean trotzdem in ein @WebServlet?",
      options: [
        {text: "Per Field-Injection mit @Inject.", correct: true, feedback: "Richtig! Der Container injiziert das Feld nach der Instanziierung durch den Web-Container."},
        {text: "Gar nicht – in Servlets ist CDI verboten.", correct: false, feedback: "Falsch, Field- und Setter-Injection funktionieren."},
        {text: "Nur über einen manuellen JNDI-Lookup.", correct: false, feedback: "Möglich, aber nicht nötig – @Inject am Feld reicht."},
        {text: "Indem man das Servlet selbst zum CDI-Bean mit @ApplicationScoped macht.", correct: false, feedback: "Servlets werden vom Web-Container verwaltet; das ist nicht der übliche Weg."}
      ]
    },
    {
      description: "Vor CDI musstest Du den Service von Hand als Singleton bauen, damit ihn mehrere Servlets teilen.",
      question: "Welche CDI-Annotation macht einen Bean zu genau einer Instanz für die ganze Anwendung?",
      options: [
        {text: "@ApplicationScoped", correct: true, feedback: "Richtig! Eine Instanz pro Anwendung – das manuelle Singleton entfällt."},
        {text: "@RequestScoped", correct: false, feedback: "Das erzeugt pro HTTP-Request eine neue Instanz."},
        {text: "@Dependent", correct: false, feedback: "Das ist der Default – die Lebensdauer hängt am injizierenden Bean."},
        {text: "@SessionScoped", correct: false, feedback: "Das bindet die Instanz an die HTTP-Session eines Benutzers."}
      ]
    },
    {
      description: "Ein CDI-Bean soll für jeden HTTP-Request frisch erzeugt werden.",
      question: "Welchen Scope wählst Du?",
      options: [
        {text: "@RequestScoped", correct: true, feedback: "Richtig! Eine neue Instanz pro Request."},
        {text: "@ApplicationScoped", correct: false, feedback: "Das wäre eine einzige geteilte Instanz für alle."},
        {text: "@SessionScoped", correct: false, feedback: "Das lebt über mehrere Requests einer Benutzer-Session."},
        {text: "@Singleton", correct: false, feedback: "Auch das wäre nur eine Instanz, nicht pro Request."}
      ]
    },
    {
      description: "Deine Webanwendung enthält KEINE beans.xml (CDI 1.1+).",
      question: "Was gilt dann für die Bean-Erkennung?",
      options: [
        {text: "Es gilt der Discovery-Mode 'annotated' (nur Beans mit Scope-Annotation).", correct: true, feedback: "Richtig! Ohne beans.xml gilt der implizite 'annotated'-Modus – z.B. wird @ApplicationScoped erkannt."},
        {text: "CDI ist ohne beans.xml komplett deaktiviert.", correct: false, feedback: "Nein, seit CDI 1.1 ist beans.xml optional."},
        {text: "Alle Klassen der Anwendung werden automatisch zu CDI-Beans, wie im Modus 'all' mit vorhandener beans.xml.", correct: false, feedback: "Das entspräche 'all' – das gilt nur bei einer leeren/entsprechend konfigurierten beans.xml."},
        {text: "Die Anwendung startet nicht.", correct: false, feedback: "Doch, sie startet ganz normal."}
      ]
    },
    {
      description: "Zwei Klassen implementieren dasselbe Interface. Ein @Inject-Punkt fordert dieses Interface an.",
      question: "Was ist die Folge und wie löst man es sauber?",
      options: [
        {text: "Die Injection ist mehrdeutig; man löst es mit einem Qualifier.", correct: true, feedback: "Richtig! Bei mehreren Kandidaten löst ein @Qualifier die Zweideutigkeit auf (Injection by-qualifier)."},
        {text: "Der Container wählt zur Laufzeit einfach automatisch und zufällig eine der beiden Implementierungen aus.", correct: false, feedback: "Nein, das Deployment schlägt mit einem 'ambiguous dependencies'-Fehler fehl."},
        {text: "Es wird immer die alphabetisch erste Klasse genommen.", correct: false, feedback: "So funktioniert die Auflösung nicht."},
        {text: "Man muss beide Beans als Liste injizieren.", correct: false, feedback: "Nicht nötig – man qualifiziert die gewünschte Implementierung."}
      ]
    },
    {
      description: "Mit Bean Validation ersetzt Du die alten if-Prüfungen durch Annotationen am Modell.",
      question: "Wie erzwingst Du, dass ein Feld nicht null ist?",
      options: [
        {text: "@NotNull", correct: true, feedback: "Richtig! Für Strings ist @NotBlank oft noch passender (nicht null, nicht leer)."},
        {text: "@Size(min = 1)", correct: false, feedback: "Vorsicht: @Size behandelt null als GÜLTIG – es prüft nur die Länge, falls ein Wert da ist."},
        {text: "@Valid", correct: false, feedback: "@Valid stößt die Validierung eines Objekts an, ist aber selbst kein Constraint."},
        {text: "@NonNull aus Lombok", correct: false, feedback: "Das ist kein Bean-Validation-Constraint."}
      ]
    },
    {
      description: "Der Service ist ein CDI-Bean. Seine Methode ist als addTodo(@Valid Todo todo) deklariert.",
      question: "Was passiert, wenn ein ungültiges Todo übergeben wird?",
      options: [
        {text: "Der Container validiert automatisch und wirft eine ConstraintViolationException.", correct: true, feedback: "Richtig! Das ist Method Validation – ganz ohne expliziten Validator-Aufruf."},
        {text: "Nichts – eine @Valid-Annotation an Methodenparametern wird vom Container grundsätzlich ignoriert.", correct: false, feedback: "Doch, bei CDI-Beans greift die Method Validation automatisch."},
        {text: "Das Todo wird still verworfen.", correct: false, feedback: "Nein, es wird eine Exception geworfen."},
        {text: "Es gibt einen Compilerfehler.", correct: false, feedback: "Nein, das ist ein Laufzeitverhalten."}
      ]
    },
    {
      description: "In der Übung hast Du @Title gebaut, das @Size und @Pattern in einer Annotation bündelt.",
      question: "Was ist ein Composite Constraint?",
      options: [
        {text: "Eine Annotation, die selbst mit anderen Constraints annotiert ist und deren Prüfungen bündelt.", correct: true, feedback: "Richtig! @Title trägt z.B. @Size und @Pattern – und braucht daher keine eigene Validator-Klasse."},
        {text: "Ein Constraint, der mehrere Felder eines Objekts gleichzeitig auf Gleichheit prüft, etwa Passwort und Passwort-Wiederholung.", correct: false, feedback: "Das ist ein klassenweiter Cross-Field-Constraint, kein Composite Constraint."},
        {text: "Ein Constraint, der zwingend eine eigene Validator-Klasse mitbringt.", correct: false, feedback: "Nein, genau das braucht ein Composite Constraint nicht."},
        {text: "Eine Validierung, die nur im Servlet funktioniert.", correct: false, feedback: "Nein, Constraints wirken am Modell, unabhängig vom Servlet."}
      ]
    },
    {
      description: "In einer CDI-Bean (z.B. dem Service) genügt @Valid am Methodenparameter, damit der Container automatisch validiert (Method Validation).",
      question: "Funktioniert diese automatische Method Validation genauso an einer Methode des Servlets?",
      options: [
        {text: "Nein – ein Servlet ist keine CDI-Bean; dort validiert man selbst mit dem injizierten Validator.", correct: true, feedback: "Richtig! Die automatische Method Validation greift nur bei CDI-verwalteten Beans, nicht beim vom Web-Container verwalteten Servlet."},
        {text: "Ja, @Valid wirkt automatisch an jeder beliebigen Java-Methode, unabhängig davon, wer die Klasse instanziiert und verwaltet.", correct: false, feedback: "Nein, es setzt einen CDI-Interceptor voraus – der greift beim Servlet nicht."},
        {text: "Ja, aber nur an der doGet-Methode.", correct: false, feedback: "Nein, der Auslöser ist die CDI-Verwaltung, nicht die konkrete Methode."},
        {text: "Nein, Bean Validation ist im Servlet komplett verboten.", correct: false, feedback: "Doch – du kannst dort jederzeit manuell über den injizierten Validator prüfen."}
      ]
    }
  ];

  let currentQuestion = 0;
  let score = 0;

  const questionContent = document.getElementById('question-content');
  const optionsContainer = document.getElementById('options-container');
  const feedbackEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  const progressBar = document.getElementById('progress-bar');
  const questionCounter = document.getElementById('question-counter');
  const scoreCounter = document.getElementById('score-counter');

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function loadQuestion() {
    const q = questions[currentQuestion];
    shuffleArray(q.options);
    feedbackEl.classList.add('hidden');
    nextBtn.classList.add('hidden');

    progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;
    questionCounter.innerText = `Frage ${currentQuestion + 1} von ${questions.length}`;
    scoreCounter.innerText = `Punkte: ${score}`;

    let html = `
                <p class="text-neutral-400 mb-4 italic">"${q.description}"</p>
                <div class="bg-[#111111] p-4 rounded-xl border-l-4 border-[#ff5401] mb-6">
                    <p class="text-lg font-medium text-white">${q.question}</p>
                </div>
            `;

    if (q.code) {
      html += `<pre class="code-block p-4 rounded-lg text-sm text-green-400 mb-6 overflow-x-auto shadow-inner">${q.code}</pre>`;
    }

    questionContent.innerHTML = html;
    optionsContainer.innerHTML = '';

    q.options.forEach((opt, index) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn w-full p-4 rounded-xl text-neutral-200 shadow-sm hover:translate-x-1';
      btn.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="flex-none w-6 h-6 rounded-full bg-[#333333] flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + index)}</span>
                        <span>${opt.text}</span>
                    </div>
                `;
      btn.onclick = () => handleAnswer(index);
      optionsContainer.appendChild(btn);
    });
  }

  function handleAnswer(index) {
    const q = questions[currentQuestion];
    const isCorrect = q.options[index].correct;
    const buttons = optionsContainer.querySelectorAll('.option-btn');

    buttons.forEach(btn => {
      btn.disabled = true;
      btn.classList.remove('hover:translate-x-1');
    });

    if (isCorrect) {
      buttons[index].classList.add('correct');
      score++;
    } else {
      buttons[index].classList.add('wrong');
      const correctIdx = q.options.findIndex(o => o.correct);
      buttons[correctIdx].classList.add('correct');
    }

    feedbackEl.innerText = q.options[index].feedback;
    feedbackEl.className = `mt-6 p-4 rounded-xl border-l-4 ${isCorrect ? 'bg-emerald-900/20 border-emerald-500 text-emerald-300' : 'bg-[#431407]/50 border-[#ff5401] text-orange-300'}`;
    feedbackEl.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
    scoreCounter.innerText = `Punkte: ${score}`;
  }

  nextBtn.onclick = () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      loadQuestion();
    } else {
      showResult();
    }
  };

  function showResult() {
    document.getElementById('question-card').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    progressBar.style.width = '100%';

    const percentage = (score / questions.length) * 100;
    let interpretation = "";

    if (percentage === 100) interpretation = "Herausragend! Servlets, JSP, CDI und Bean Validation sitzen perfekt.";
    else if (percentage >= 80) interpretation = "Sehr gut! Du hast die Jakarta-EE-Grundlagen sicher drauf.";
    else if (percentage >= 50) interpretation = "Gute Basis! Die wichtigsten Konzepte sitzen schon.";
    else interpretation = "Ein guter Start! Schau dir die Übungen zu CDI und Bean Validation noch einmal an.";

    document.getElementById('final-score').innerText = `${score} von ${questions.length} Punkten (${Math.round(percentage)}%)`;
    document.getElementById('score-interpretation').innerText = interpretation;
  }

  loadQuestion();
</script>
</body>
</html>
