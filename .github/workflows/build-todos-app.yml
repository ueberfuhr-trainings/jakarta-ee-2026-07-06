name: todos-app (Jakarta EE)

# Läuft nur, wenn Dateien im Ordner todos-app/ (oder dieser Workflow) geändert
# wurden – bei Pull Requests und beim Merge (Push) auf main.
on:
  pull_request:
    paths:
      - 'todos-app/**'
      - '.github/workflows/build-todos-app.yml'
  push:
    branches: [ main ]
    paths:
      - 'todos-app/**'
      - '.github/workflows/build-todos-app.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # mvn verify baut das WAR und führt die Integrationstests (REST-Assured)
      # gegen einen von Maven gestarteten Open Liberty mit In-Memory-Datasource aus.
      - name: Build & test (mvn verify)
        working-directory: todos-app
        run: mvn -B clean verify

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: todos-app-war
          path: todos-app/target/*.war
          if-no-files-found: error
