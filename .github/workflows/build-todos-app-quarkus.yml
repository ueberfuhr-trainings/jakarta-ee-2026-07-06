name: todos-app-quarkus (Quarkus)

# Läuft nur, wenn Dateien im Ordner todos-app-quarkus/ (oder dieser Workflow)
# geändert wurden – bei Pull Requests und beim Merge (Push) auf main.
on:
  pull_request:
    paths:
      - 'todos-app-quarkus/**'
      - '.github/workflows/build-todos-app-quarkus.yml'
  push:
    branches: [ main ]
    paths:
      - 'todos-app-quarkus/**'
      - '.github/workflows/build-todos-app-quarkus.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # mvn test führt die @QuarkusTest-Tests aus (In-Memory-H2 via %test-Profil).
      - name: Test (mvn test)
        working-directory: todos-app-quarkus
        run: mvn -B clean test
