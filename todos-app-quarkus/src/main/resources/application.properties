# Anwendungs-Konfiguration (Quarkus, MicroProfile Config). Gegenstueck zu
# server.xml/persistence.xml/microprofile-config.properties der Jakarta-EE-App -
# hier steht alles gebuendelt in application.properties.

# Datenbank (H2, dateibasiert). Quarkus konfiguriert die DataSource automatisch.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:file:./.localdb/todos-quarkus;AUTO_SERVER=TRUE

# Schema aus den Entities erzeugen/aktualisieren
quarkus.hibernate-orm.database.generation=update

# Beispieldaten beim Start anlegen? Konvention: deaktiviert (siehe SampleDataInitializer).
todos.sampledata.enabled=false

# --- Test-Profil (@QuarkusTest): In-Memory-DB, Schema je Lauf frisch ---
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:todos-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
